{% extends "base.html" %}
{% block title %}{{ t.page_404_title if t else "Page not found" }} — MovieFinder{% endblock %}
{% block content %}
<section class="max-w-2xl mx-auto px-4 py-20 text-center">
  <div class="text-8xl mb-6">🎬</div>
  <h1 class="text-4xl font-black mb-4">404</h1>
  <p class="text-muted text-lg mb-8">{{ t.page_404_desc if t else "Movie or page not found" }}</p>
  <a href="/" class="bg-accent hover:bg-accent-hover text-white font-bold px-8 py-3 rounded-full transition-colors inline-block">
    {{ t.page_404_back if t else "← Back to Home" }}
  </a>
</section>
{% endblock %}
